{% load static %}
<!DOCTYPE html>

<html>

<head>

<title>Admin Dashboard</title>

<link rel="stylesheet" href="{% static 'css/style.css' %}">

<style>

.dashboard{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:20px;
padding:40px;
}

.card{
background:white;
padding:30px;
border-radius:10px;
box-shadow:0 4px 10px rgba(0,0,0,0.1);
text-align:center;
}

.card h2{
margin:0;
color:#e63946;
}

.card p{
font-size:18px;
}

</style>

</head>

<body>

{% include "navbar.html" %}

<h1 style="text-align:center;">Admin Dashboard</h1>

<div class="dashboard">

<div class="card">

<h2>{{ total_donors }}</h2>

<p>Total Donors</p>

</div>


<div class="card">

<h2>{{ available_donors }}</h2>

<p>Available Donors</p>

</div>


<div class="card">

<h2>{{ tirupati }}</h2>

<p>Tirupati</p>

</div>


<div class="card">

<h2>{{ renigunta }}</h2>

<p>Renigunta</p>

</div>


<div class="card">

<h2>{{ chandragiri }}</h2>

<p>Chandragiri</p>

</div>

</div>

</body>

</html>
